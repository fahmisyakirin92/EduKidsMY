<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDU KIDS MY - Mari Belajar!</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #fef08a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .bounce-hover:hover {
            transform: translateY(-5px) scale(1.02);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .float {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        /* Ultra clean scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDURjNxBuaC5xMd7Py5pTOG8LmQawLnQIs",
            authDomain: "edukids-my.firebaseapp.com",
            databaseURL: "https://edukids-my-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "edukids-my",
            storageBucket: "edukids-my.firebasestorage.app",
            messagingSenderId: "684848089074",
            appId: "1:684848089074:web:5bb13ac77a2f9fd8b88d6b"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        const { useState, useEffect } = React;

        // UI Components
        const Button = ({ children, color, onClick, large }) => {
            const colors = {
                blue: "bg-blue-400 hover:bg-blue-500 shadow-blue-200",
                green: "bg-green-400 hover:bg-green-500 shadow-green-200",
                yellow: "bg-yellow-400 hover:bg-yellow-500 shadow-yellow-200 text-yellow-900",
                purple: "bg-purple-400 hover:bg-purple-500 shadow-purple-200",
                orange: "bg-orange-400 hover:bg-orange-500 shadow-orange-200"
            };
            const sizeClasses = large ? "text-3xl py-6 px-10 rounded-3xl" : "text-xl py-4 px-6 rounded-2xl";
            
            return (
                <button 
                    onClick={onClick}
                    className={`font-bold text-white shadow-xl ${colors[color]} ${sizeClasses} bounce-hover border-b-4 border-black/10 w-full transition-all`}
                >
                    {children}
                </button>
            );
        };

        const Card = ({ children }) => (
            <div className="bg-white/90 backdrop-blur-sm p-8 rounded-[2.5rem] shadow-2xl border-4 border-white pop-in">
                {children}
            </div>
        );

        // Screens
        const Home = ({ setView }) => (
            <div className="max-w-4xl mx-auto p-6 pt-12 text-center">
                <div className="flex justify-between items-center mb-8">
                    <div className="bg-white/80 py-2 px-6 rounded-full font-bold text-purple-600 shadow-sm border-2 border-purple-100">
                        ⭐ 120 Bintang
                    </div>
                    <button className="bg-gray-800 text-white py-2 px-6 rounded-full font-bold hover:bg-gray-700 transition">
                        Ibu Bapa (Parents)
                    </button>
                </div>

                <div className="float text-9xl mb-6">🦉</div>
                <h1 className="text-6xl font-black text-blue-600 mb-2 drop-shadow-md">EDU KIDS MY</h1>
                <p className="text-2xl font-bold text-gray-600 mb-10">Jom belajar bersama Cikgu Owl!</p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <Button color="blue" large onClick={() => setView('bm')}>
                        🅰️ Bahasa Melayu
                    </Button>
                    <Button color="purple" large onClick={() => setView('eng')}>
                        🔤 English
                    </Button>
                    <Button color="green" large onClick={() => setView('math')}>
                        🔢 Matematik
                    </Button>
                    <Button color="orange" large onClick={() => setView('rewards')}>
                        🎁 Ganjaran Saya
                    </Button>
                </div>
            </div>
        );

        const LessonBM = ({ setView }) => {
            const [step, setStep] = useState(0);
            
            const words = [
                { word: "Kucing", image: "🐱", syllables: "Ku - cing", sound: "Meow!" },
                { word: "Nasi Lemak", image: "🍛", syllables: "Na - si  Le - mak", sound: "Sedap!" }
            ];

            const playSound = (text) => {
                // In production, this would play actual high-quality voice audio files
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ms-MY';
                window.speechSynthesis.speak(utterance);
            };

            const handleNext = () => {
                if (step < words.length - 1) {
                    setStep(step + 1);
                } else {
                    setView('home');
                }
            };

            return (
                <div className="max-w-2xl mx-auto p-6 pt-12">
                    <button onClick={() => setView('home')} className="mb-6 font-bold text-gray-500 hover:text-gray-800 text-xl">
                        ⬅️ Kembali
                    </button>
                    
                    <Card>
                        <h2 className="text-3xl font-black text-center text-blue-500 mb-8">Mari Membaca!</h2>
                        
                        <div 
                            className="text-center cursor-pointer mb-8 bounce-hover"
                            onClick={() => playSound(words[step].word)}
                        >
                            <div className="text-[8rem] mb-4 float">{words[step].image}</div>
                            <h3 className="text-6xl font-black text-gray-800 mb-2">{words[step].word}</h3>
                            <p className="text-3xl font-bold text-blue-400">{words[step].syllables}</p>
                            <p className="text-sm text-gray-400 mt-4">(Tekan gambar untuk dengar)</p>
                        </div>

                        <Button color="green" onClick={handleNext}>
                            {step < words.length - 1 ? "Seterusnya ➡️" : "Tamat! 🎉"}
                        </Button>
                    </Card>
                </div>
            );
        };

        const Rewards = ({ setView }) => (
            <div className="max-w-3xl mx-auto p-6 pt-12">
                <button onClick={() => setView('home')} className="mb-6 font-bold text-gray-500 hover:text-gray-800 text-xl">
                    ⬅️ Kembali
                </button>
                
                <Card>
                    <h2 className="text-4xl font-black text-center text-orange-500 mb-8">Peti Harta Karun! 🏴‍☠️</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div className="bg-orange-50 p-6 rounded-3xl border-2 border-orange-200 text-center">
                            <div className="text-6xl mb-4">🏆</div>
                            <h3 className="text-2xl font-bold text-gray-800">Lencana Bijak</h3>
                            <p className="text-orange-600 font-bold">Dibuka!</p>
                        </div>
                        
                        <div className="bg-blue-50 p-6 rounded-3xl border-2 border-blue-200 text-center">
                            <div className="text-6xl mb-4">🖨️</div>
                            <h3 className="text-2xl font-bold text-gray-800">Keychain Cikgu Owl</h3>
                            <p className="text-sm text-gray-600 mt-2 mb-3">Ganjaran Fizikal Ibu Bapa</p>
                            <button className="bg-blue-500 text-white font-bold py-2 px-4 rounded-xl text-sm w-full hover:bg-blue-600 transition">
                                Muat Turun Fail 3MF/STL
                            </button>
                            <p className="text-xs text-gray-400 mt-2">Sesuai untuk build plate 256x256x256mm</p>
                        </div>
                    </div>
                </Card>
            </div>
        );

        // Main App Component
        const App = () => {
            const [view, setView] = useState('home');

            return (
                <div className="min-h-screen relative">
                    {view === 'home' && <Home setView={setView} />}
                    {view === 'bm' && <LessonBM setView={setView} />}
                    {view === 'eng' && <div className="p-12 text-center text-2xl font-bold pop-in"><button onClick={()=>setView('home')}>⬅️ Back</button><br/><br/>English Module Loading...</div>}
                    {view === 'math' && <div className="p-12 text-center text-2xl font-bold pop-in"><button onClick={()=>setView('home')}>⬅️ Kembali</button><br/><br/>Modul Matematik Sedang Dimuatkan...</div>}
                    {view === 'rewards' && <Rewards setView={setView} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
